<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Photo Vault – Expenses, Income, Letters</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a2a3a, #0f172a);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
            color: #eee;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .card {
            background: rgba(15, 25, 35, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,200,100,0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        h1 {
            color: #ffcc44;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            border-bottom: 1px solid #2c3e50;
            padding-bottom: 8px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.2rem;
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #ffcc44;
            color: #1e2a3a;
            font-weight: bold;
        }
        .page {
            display: none;
        }
        .page.active-page {
            display: block;
        }
        .upload-area {
            background: #1e2a3a;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px dashed #ffaa33;
        }
        input, button {
            padding: 10px 16px;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
        }
        input {
            background: #0f1a24;
            color: white;
            border: 1px solid #3a4a5a;
            width: 100%;
            max-width: 300px;
            margin-bottom: 10px;
        }
        button {
            background: #ffaa33;
            color: #1e2a3a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #ffcc44;
            transform: scale(1.02);
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .search-section {
            margin-top: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            align-items: center;
        }
        .result-card {
            background: #0f1a24;
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
            border-left: 5px solid #ffaa33;
        }
        .result-card img {
            max-width: 100%;
            border-radius: 15px;
            margin-top: 10px;
            max-height: 300px;
            object-fit: contain;
        }
        .message {
            padding: 10px;
            border-radius: 30px;
            background: #2c3e50;
            margin-top: 10px;
            text-align: center;
        }
        .error {
            background: #8b0000cc;
        }
        .success {
            background: #2e7d32cc;
        }
        .loading {
            background: #1e5a96cc;
        }
        .lock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .lock-box {
            background: #1e2a3a;
            padding: 30px;
            border-radius: 40px;
            text-align: center;
            width: 90%;
            max-width: 350px;
        }
        .lock-box input {
            width: 100%;
            margin: 15px 0;
        }
        .storage-info {
            background: #1e2a3a;
            border-radius: 15px;
            padding: 10px 15px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            border-left: 4px solid #ffaa33;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .gallery-item {
            background: #0f1a24;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #ffaa33;
            cursor: pointer;
            transition: 0.3s;
        }
        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255,170,51,0.5);
        }
        .gallery-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .gallery-item-title {
            padding: 10px;
            font-size: 0.9rem;
            color: #ffcc44;
        }
        .delete-btn {
            background: #cc3333;
            padding: 5px 10px;
            font-size: 0.8rem;
            margin-top: 5px;
            width: 100%;
        }
        .delete-btn:hover {
            background: #ff3333;
        }
        @media (max-width: 700px) {
            .tabs { gap: 5px; }
            .tab-btn { padding: 6px 12px; font-size: 1rem; }
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📸 Photo Vault</h1>
        <p>📤 Upload photos | 🔍 Search | 👥 Everyone can view | 💾 1GB Cloud Storage</p>
        <div class="storage-info">
            <strong>📊 Storage Used:</strong> <span id="storageUsed">0</span> MB / 1000 MB
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-page="expenses">💰 Expenses</button>
        <button class="tab-btn" data-page="income">📈 Income</button>
        <button class="tab-btn" data-page="letters">✉️ Letters</button>
    </div>

    <!-- Expenses Page -->
    <div id="expenses" class="page active-page">
        <div class="upload-area">
            <h3>📤 Upload to Expenses</h3>
            <input type="text" id="expenseHeadline" placeholder="Headline">
            <input type="file" id="expenseImage" accept="image/*">
            <button id="expenseUploadBtn">Upload (password required)</button>
            <div id="expenseUploadMsg"></div>
        </div>
        <div class="search-section">
            <h3>🔍 Search in Expenses</h3>
            <div class="search-box">
                <input type="text" id="expenseSearch" placeholder="Enter headline...">
                <button id="expenseSearchBtn">Search</button>
            </div>
            <div id="expenseResult"></div>
        </div>
        <div id="expenseGallery" class="gallery"></div>
    </div>

    <!-- Income Page -->
    <div id="income" class="page">
        <div class="upload-area">
            <h3>📤 Upload to Income</h3>
            <input type="text" id="incomeHeadline" placeholder="Headline">
            <input type="file" id="incomeImage" accept="image/*">
            <button id="incomeUploadBtn">Upload (password required)</button>
            <div id="incomeUploadMsg"></div>
        </div>
        <div class="search-section">
            <h3>🔍 Search in Income</h3>
            <div class="search-box">
                <input type="text" id="incomeSearch" placeholder="Enter headline...">
                <button id="incomeSearchBtn">Search</button>
            </div>
            <div id="incomeResult"></div>
        </div>
        <div id="incomeGallery" class="gallery"></div>
    </div>

    <!-- Letters Page -->
    <div id="letters" class="page">
        <div class="upload-area">
            <h3>📤 Upload to Letters</h3>
            <input type="text" id="letterHeadline" placeholder="Headline">
            <input type="file" id="letterImage" accept="image/*">
            <button id="letterUploadBtn">Upload (password required)</button>
            <div id="letterUploadMsg"></div>
        </div>
        <div class="search-section">
            <h3>🔍 Search in Letters</h3>
            <div class="search-box">
                <input type="text" id="letterSearch" placeholder="Enter headline...">
                <button id="letterSearchBtn">Search</button>
            </div>
            <div id="letterResult"></div>
        </div>
        <div id="letterGallery" class="gallery"></div>
    </div>
</div>

<script>
    // Backend API endpoint (configure this)
    const API_URL = "https://photo-vault-api.vercel.app"; // Will replace with your API URL

    // ---------- Password protection (session only) ----------
    const CORRECT_PASSWORD = "6905";
    let isAuthenticated = sessionStorage.getItem("auth") === "true";

    function showPasswordModal() {
        if (isAuthenticated) return;
        const modal = document.createElement("div");
        modal.className = "lock-overlay";
        modal.innerHTML = `
            <div class="lock-box">
                <h2>🔒 Enter Password</h2>
                <input type="password" id="passwordInput" placeholder="Password">
                <button id="submitPassword">Unlock</button>
                <div id="passwordError" style="color:#ff8888; margin-top:10px;"></div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById("submitPassword").addEventListener("click", () => {
            const pwd = document.getElementById("passwordInput").value;
            if (pwd === CORRECT_PASSWORD) {
                isAuthenticated = true;
                sessionStorage.setItem("auth", "true");
                modal.remove();
            } else {
                document.getElementById("passwordError").innerText = "Wrong password!";
            }
        });
    }

    // ---------- API Calls ----------
    async function uploadPhoto(category, headline, imageBase64) {
        try {
            const response = await fetch(`${API_URL}/api/photos`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    category,
                    headline: headline.trim(),
                    imageData: imageBase64
                })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Upload failed');
            return data;
        } catch (err) {
            throw new Error(err.message);
        }
    }

    async function searchPhotos(category, headline) {
        try {
            const response = await fetch(`${API_URL}/api/photos/search?category=${category}&headline=${encodeURIComponent(headline)}`);
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Search failed');
            return data;
        } catch (err) {
            throw new Error(err.message);
        }
    }

    async function getAllPhotos(category) {
        try {
            const response = await fetch(`${API_URL}/api/photos?category=${category}`);
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Fetch failed');
            return data;
        } catch (err) {
            throw new Error(err.message);
        }
    }

    async function deletePhoto(photoId) {
        try {
            const response = await fetch(`${API_URL}/api/photos/${photoId}`, {
                method: 'DELETE'
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Delete failed');
            return data;
        } catch (err) {
            throw new Error(err.message);
        }
    }

    async function getStorageUsage() {
        try {
            const response = await fetch(`${API_URL}/api/storage`);
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Fetch failed');
            return data;
        } catch (err) {
            console.error('Storage fetch error:', err);
            return { usedMB: 0 };
        }
    }

    // Helper: read image file as base64
    function readFileAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // ----- UI Helpers -----
    function showMessage(containerId, text, isError = false) {
        const div = document.getElementById(containerId);
        if (!div) return;
        const messageClass = isError ? 'error' : 'success';
        div.innerHTML = `<div class="message ${messageClass}">${text}</div>`;
        setTimeout(() => div.innerHTML = "", 4000);
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function updateStorageDisplay() {
        const usage = await getStorageUsage();
        document.getElementById("storageUsed").textContent = Math.round(usage.usedMB);
    }

    async function displayGallery(category, galleryId) {
        try {
            const photos = await getAllPhotos(category);
            const gallery = document.getElementById(galleryId);
            
            if (!photos.photos || photos.photos.length === 0) {
                gallery.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #aaa;">No photos yet</p>';
                return;
            }

            gallery.innerHTML = photos.photos.map(photo => `
                <div class="gallery-item">
                    <img src="${photo.imageData}" alt="${escapeHtml(photo.headline)}" />
                    <div class="gallery-item-title">${escapeHtml(photo.headline)}</div>
                    <button class="delete-btn" onclick="handleDelete('${photo.id}', '${category}')">Delete</button>
                </div>
            `).join('');
        } catch (err) {
            console.error('Gallery error:', err);
        }
    }

    window.handleDelete = async function(photoId, category) {
        if (!isAuthenticated) {
            showPasswordModal();
            return;
        }
        if (confirm('Are you sure you want to delete this photo?')) {
            try {
                await deletePhoto(photoId);
                await displayGallery(category, `${category}Gallery`);
                await updateStorageDisplay();
            } catch (err) {
                alert('Delete failed: ' + err.message);
            }
        }
    };

    // ----- Setup for a specific category -----
    function setupCategory(category, uploadBtnId, headlineInputId, imageInputId, uploadMsgId, searchInputId, searchBtnId, resultContainerId, galleryId) {
        // Upload
        const uploadBtn = document.getElementById(uploadBtnId);
        uploadBtn.addEventListener("click", async () => {
            if (!isAuthenticated) {
                showPasswordModal();
                return;
            }
            const headline = document.getElementById(headlineInputId).value.trim();
            const fileInput = document.getElementById(imageInputId);
            const file = fileInput.files[0];
            
            if (!headline) {
                showMessage(uploadMsgId, "Please enter a headline", true);
                return;
            }
            if (!file) {
                showMessage(uploadMsgId, "Please select an image", true);
                return;
            }

            uploadBtn.disabled = true;
            showMessage(uploadMsgId, "Uploading...", false);

            try {
                const base64 = await readFileAsBase64(file);
                await uploadPhoto(category, headline, base64);
                showMessage(uploadMsgId, "Photo uploaded successfully!", false);
                document.getElementById(headlineInputId).value = "";
                fileInput.value = "";
                await displayGallery(category, galleryId);
                await updateStorageDisplay();
            } catch (err) {
                showMessage(uploadMsgId, "Error: " + err.message, true);
            } finally {
                uploadBtn.disabled = false;
            }
        });

        // Search
        const searchBtn = document.getElementById(searchBtnId);
        const searchInput = document.getElementById(searchInputId);
        async function performSearch() {
            const term = searchInput.value.trim();
            if (!term) {
                document.getElementById(resultContainerId).innerHTML = `<div class="message error">Enter a headline to search</div>`;
                return;
            }
            try {
                const result = await searchPhotos(category, term);
                if (result.photos && result.photos.length > 0) {
                    const photo = result.photos[0];
                    document.getElementById(resultContainerId).innerHTML = `
                        <div class="result-card">
                            <strong>📌 Headline:</strong> ${escapeHtml(photo.headline)}<br>
                            <img src="${photo.imageData}" alt="Searched photo">
                        </div>
                    `;
                } else {
                    document.getElementById(resultContainerId).innerHTML = `<div class="message error">No photo found with headline "${term}"</div>`;
                }
            } catch (err) {
                document.getElementById(resultContainerId).innerHTML = `<div class="message error">Search error: ${err.message}</div>`;
            }
        }
        searchBtn.addEventListener("click", performSearch);
        searchInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") performSearch();
        });
    }

    // ----- Tab switching -----
    function initTabs() {
        const tabs = document.querySelectorAll(".tab-btn");
        const pages = document.querySelectorAll(".page");
        tabs.forEach(tab => {
            tab.addEventListener("click", async () => {
                const pageId = tab.dataset.page;
                tabs.forEach(t => t.classList.remove("active"));
                tab.classList.add("active");
                pages.forEach(page => {
                    page.classList.remove("active-page");
                    if (page.id === pageId) page.classList.add("active-page");
                });
                // Load gallery for this category
                await displayGallery(pageId, `${pageId}Gallery`);
            });
        });
    }

    // ----- Initialize on page load -----
    window.addEventListener("load", async () => {
        if (!isAuthenticated) {
            showPasswordModal();
        }
        
        setupCategory("expenses", "expenseUploadBtn", "expenseHeadline", "expenseImage", "expenseUploadMsg", "expenseSearch", "expenseSearchBtn", "expenseResult", "expenseGallery");
        setupCategory("income", "incomeUploadBtn", "incomeHeadline", "incomeImage", "incomeUploadMsg", "incomeSearch", "incomeSearchBtn", "incomeResult", "incomeGallery");
        setupCategory("letters", "letterUploadBtn", "letterHeadline", "letterImage", "letterUploadMsg", "letterSearch", "letterSearchBtn", "letterResult", "letterGallery");

        initTabs();
        
        // Load initial gallery
        await displayGallery("expenses", "expenseGallery");
        await updateStorageDisplay();

        // Update storage every 30 seconds
        setInterval(updateStorageDisplay, 30000);
    });
</script>
</body>
</html>
